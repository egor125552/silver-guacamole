name: Pages Release Gate

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Record release decision
        env:
          MERGED: ${{ github.event.pull_request.merged }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [ "$MERGED" = "true" ]; then
            test -n "$MERGE_SHA"
            printf '%s\n' "$MERGE_SHA" > pages-release-sha.txt
          else
            printf '%s\n' "SKIP" > pages-release-sha.txt
          fi
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: pages-release-metadata
          path: pages-release-sha.txt
          retention-days: 1
