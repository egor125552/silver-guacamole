name: Pages Release Gate

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Confirm merged main release
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: test -n "$MERGE_SHA"
