name: Pages Release Gate

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  gate:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Record merged main commit
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          test -n "$MERGE_SHA"
          printf '%s\n' "$MERGE_SHA" > pages-release-sha.txt
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: pages-release-metadata
          path: pages-release-sha.txt
          retention-days: 1
