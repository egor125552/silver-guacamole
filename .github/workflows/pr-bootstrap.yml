name: Bootstrap Midnight Switchyard PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  expand:
    if: github.head_ref == 'midnight-switchyard'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Expand verified project payload
        shell: bash
        run: |
          set -euo pipefail
          test "$(find bootstrap -maxdepth 1 -name 'chunk-*' | wc -l)" -eq 8
          cat bootstrap/chunk-* | base64 --decode > "$RUNNER_TEMP/project.tar.gz"
          tar -tzf "$RUNNER_TEMP/project.tar.gz" >/dev/null
          mkdir "$RUNNER_TEMP/project"
          tar -xzf "$RUNNER_TEMP/project.tar.gz" -C "$RUNNER_TEMP/project"
          test -f "$RUNNER_TEMP/project/package.json"
          test -f "$RUNNER_TEMP/project/.github/workflows/materialize.yml"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/project/." .
          rm -rf bootstrap .github/workflows/bootstrap.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add complete Midnight Switchyard game [bootstrap-expanded]"
          git push origin HEAD:${{ github.head_ref }}
