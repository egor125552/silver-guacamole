name: Trusted source restoration v2

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  TARGET_BRANCH: agent/midnight-switchyard-production
  PATCH_SHA256: 88dd8f47791ea1ba254ba0ed2ce5846bac55cea94b4af2349963f039f19f3d42

jobs:
  restore-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Restore or record exact failure
        shell: bash
        run: |
          set +e
          source_dir="$RUNNER_TEMP/source"
          log_file="$RUNNER_TEMP/restore-v2.log"
          status_file="$RUNNER_TEMP/restore-v2-status.txt"
          : > "$log_file"

          cat \
            .recovery/patch-00 \
            .recovery/patch-01 \
            .recovery/patch-02 \
            .recovery/patch-03 \
            .recovery/patch-04 \
            .recovery/patch-missing-04 \
            .recovery/patch-05 \
            .recovery/patch-06 \
            .recovery/patch-07-0 \
            .recovery/patch-07-1 \
            .recovery/patch-07-2 \
            .recovery/patch-07-3 \
            .recovery/patch-08 \
            .recovery/patch-09 \
            .recovery/patch-10 \
            | base64 --decode > "$RUNNER_TEMP/production.patch.xz" 2>>"$log_file"
          decode_status=$?
          xz --test "$RUNNER_TEMP/production.patch.xz" 2>>"$log_file"; xz_status=$?
          xz --decompress --stdout "$RUNNER_TEMP/production.patch.xz" > "$RUNNER_TEMP/production.patch" 2>>"$log_file"; decompress_status=$?
          actual_sha=$(sha256sum "$RUNNER_TEMP/production.patch" 2>/dev/null | cut -d' ' -f1)
          [ "$actual_sha" = "$PATCH_SHA256" ]; sha_status=$?

          cat bootstrap/chunk-* | base64 --decode > "$RUNNER_TEMP/original.tar.gz" 2>>"$log_file"; archive_status=$?
          mkdir -p "$source_dir"
          tar -xzf "$RUNNER_TEMP/original.tar.gz" -C "$source_dir" 2>>"$log_file"; extract_status=$?
          git -C "$source_dir" init -q >>"$log_file" 2>&1; init_status=$?
          git -C "$source_dir" add -A >>"$log_file" 2>&1; add_status=$?
          git -C "$source_dir" -c user.name=recovery -c user.email=recovery@example.invalid commit -qm baseline >>"$log_file" 2>&1; baseline_status=$?
          git -C "$source_dir" apply --index --exclude=RECOVERED_ARCHIVE_FILE_LIST.txt "$RUNNER_TEMP/production.patch" >>"$log_file" 2>&1; apply_status=$?
          rm -rf "$source_dir/.git"

          test -f "$source_dir/package.json"; package_status=$?
          test -f "$source_dir/src/game/pathfinding.ts"; pathfinding_status=$?
          test -f "$source_dir/src/scenes/GameScene.ts"; scene_status=$?
          test -f "$source_dir/.github/workflows/ci.yml"; ci_status=$?
          test -f "$source_dir/.github/workflows/pages.yml"; pages_status=$?
          test ! -e "$source_dir/bootstrap"; no_bootstrap_status=$?
          test ! -e "$source_dir/.recovery"; no_recovery_status=$?
          test ! -e "$source_dir/.github/workflows/materialize.yml"; no_materialize_status=$?

          overall=0
          for value in "$decode_status" "$xz_status" "$decompress_status" "$sha_status" "$archive_status" "$extract_status" "$init_status" "$add_status" "$baseline_status" "$apply_status" "$package_status" "$pathfinding_status" "$scene_status" "$ci_status" "$pages_status" "$no_bootstrap_status" "$no_recovery_status" "$no_materialize_status"; do
            if [ "$value" -ne 0 ]; then overall=1; fi
          done

          {
            echo "event=${{ github.event_name }}"
            echo "pr=${{ github.event.pull_request.number }}"
            echo "head=${{ github.event.pull_request.head.ref }}"
            echo "decode_status=$decode_status"
            echo "xz_status=$xz_status"
            echo "decompress_status=$decompress_status"
            echo "sha_status=$sha_status"
            echo "actual_sha=$actual_sha"
            echo "archive_status=$archive_status"
            echo "extract_status=$extract_status"
            echo "init_status=$init_status"
            echo "add_status=$add_status"
            echo "baseline_status=$baseline_status"
            echo "apply_status=$apply_status"
            echo "package_status=$package_status"
            echo "pathfinding_status=$pathfinding_status"
            echo "scene_status=$scene_status"
            echo "ci_status=$ci_status"
            echo "pages_status=$pages_status"
            echo "no_bootstrap_status=$no_bootstrap_status"
            echo "no_recovery_status=$no_recovery_status"
            echo "no_materialize_status=$no_materialize_status"
            echo "overall=$overall"
            echo "--- log tail ---"
            tail -80 "$log_file"
          } > "$status_file"

          if [ "$overall" -eq 0 ]; then
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cp -a "$source_dir/." .
            git add -A
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Restore reviewed Midnight Switchyard source tree'
          else
            cp "$status_file" .recovery/source-restore-v2-status.txt
            git add .recovery/source-restore-v2-status.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Record source restoration v2 failure' || true
          fi
          git push origin "HEAD:$TARGET_BRANCH"
          exit "$overall"
