name: Trusted production patch diagnostic

on:
  push:
    branches: [main]
    paths: [.github/workflows/trusted-restore-push.yml]
  workflow_dispatch:

permissions:
  contents: write

env:
  TARGET_BRANCH: agent/midnight-switchyard-production
  PATCH_SHA256: 88dd8f47791ea1ba254ba0ed2ce5846bac55cea94b4af2349963f039f19f3d42

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct patch and record exact result
        shell: bash
        run: |
          set +e
          mkdir -p .recovery
          cat \
            .recovery/patch-00 \
            .recovery/patch-01 \
            .recovery/patch-02 \
            .recovery/patch-03 \
            .recovery/patch-04 \
            .recovery/patch-missing-04 \
            .recovery/patch-05 \
            .recovery/patch-06 \
            .recovery/patch-07-0 \
            .recovery/patch-07-1 \
            .recovery/patch-07-2 \
            .recovery/patch-07-3 \
            .recovery/patch-08 \
            .recovery/patch-09 \
            .recovery/patch-10 \
            | base64 --decode > "$RUNNER_TEMP/production.patch.xz"
          decode_status=$?
          xz --test "$RUNNER_TEMP/production.patch.xz"
          xz_status=$?
          xz --decompress --stdout "$RUNNER_TEMP/production.patch.xz" > "$RUNNER_TEMP/production.patch"
          decompress_status=$?
          actual_sha=$(sha256sum "$RUNNER_TEMP/production.patch" 2>/dev/null | cut -d' ' -f1)
          if [ "$actual_sha" = "$PATCH_SHA256" ]; then sha_status=0; else sha_status=1; fi
          {
            echo "decode_status=$decode_status"
            echo "xz_status=$xz_status"
            echo "decompress_status=$decompress_status"
            echo "expected_sha=$PATCH_SHA256"
            echo "actual_sha=$actual_sha"
            echo "sha_status=$sha_status"
            echo "compressed_bytes=$(wc -c < "$RUNNER_TEMP/production.patch.xz")"
            echo "patch_bytes=$(wc -c < "$RUNNER_TEMP/production.patch")"
            echo "diagnostic_run=3"
          } > .recovery/diagnostic-result.txt
          git add .recovery/diagnostic-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Record production patch diagnostic' || true
          git push origin "HEAD:$TARGET_BRANCH"
