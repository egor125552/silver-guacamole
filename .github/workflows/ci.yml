name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  CI: true

jobs:
  audio-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install audio build tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip curl
      - name: Build licensed production audio and capture full output
        shell: bash
        run: |
          set +e
          node scripts/build-audio.mjs > audio-build.log 2>&1
          code=$?
          cat audio-build.log
          printf '%s\n' "$code" > audio-build.exit
          exit "$code"
      - name: Upload audio diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-build-diagnostics
          path: |
            audio-build.log
            audio-build.exit
          retention-days: 3
