name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install production build tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip curl
      - name: Configure Rust and wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked --version 0.15.0
      - name: Materialize pinned Aaja engine
        run: npm run engine:materialize
      - name: Install game dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint and typecheck
        run: npm run lint
      - name: Run unit and contract tests
        run: npm run test:unit
      - name: Build licensed production audio
        run: npm run audio:build
      - name: Verify production audio
        run: npm run audio:verify
      - name: Verify repository contracts
        run: npm run repo:verify
      - name: Build production game
        run: npm run build
      - name: Verify production artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/index.html
          test -s dist/assets/audio/manifest.json
          test -s vendor/aaja-package/dist/wasm/audio_game_core_bg.wasm
          test -s dist/assets/audio_game_core_bg.wasm
          test "$(find dist/assets/audio -maxdepth 1 -name '*.ogg' | wc -l)" -eq 31
          ! grep -R "localhost\|127.0.0.1" dist --include='*.js' --include='*.html'
          test "$(du -sb dist | cut -f1)" -lt 50000000
      - uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          retention-days: 7

  chromium-playthroughs:
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - run: npx playwright install --with-deps chromium
      - name: Full command-driven playthroughs, losses, restart, save and reset
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-chromium
          path: |
            playwright-report
            test-results
          retention-days: 7

  cross-browser-smoke:
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        project: [firefox, webkit]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - run: npx playwright install --with-deps ${{ matrix.project }}
      - run: npx playwright test tests/e2e/smoke.spec.mjs --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          retention-days: 7

  mobile-webkit-gestures:
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - run: npx playwright install --with-deps webkit
      - run: npx playwright test tests/e2e/smoke.spec.mjs --project=mobile-webkit
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-mobile-webkit
          path: |
            playwright-report
            test-results
          retention-days: 7
