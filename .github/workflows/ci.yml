name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  CI: true

jobs:
  audio-verification-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install audio build tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip curl
      - name: Build licensed production audio
        run: node scripts/build-audio.mjs
      - name: Verify production audio and capture full output
        shell: bash
        run: |
          set +e
          node scripts/verify-audio.mjs > audio-verify.log 2>&1
          code=$?
          cat audio-verify.log
          printf '%s\n' "$code" > audio-verify.exit
          exit "$code"
      - name: Upload audio verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-verify-diagnostics
          path: |
            audio-verify.log
            audio-verify.exit
          retention-days: 3
