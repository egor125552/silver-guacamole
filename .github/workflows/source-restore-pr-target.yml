name: Trusted PR event source restoration

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  TARGET_BRANCH: agent/midnight-switchyard-production
  TRIGGER_BRANCH: agent/source-restore-event
  PATCH_SHA256: 88dd8f47791ea1ba254ba0ed2ce5846bac55cea94b4af2349963f039f19f3d42

jobs:
  restore-source:
    if: github.event.pull_request.head.ref == env.TRIGGER_BRANCH && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Restore ordinary reviewed source tree
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .recovery/patch-00 \
            .recovery/patch-01 \
            .recovery/patch-02 \
            .recovery/patch-03 \
            .recovery/patch-04 \
            .recovery/patch-missing-04 \
            .recovery/patch-05 \
            .recovery/patch-06 \
            .recovery/patch-07-0 \
            .recovery/patch-07-1 \
            .recovery/patch-07-2 \
            .recovery/patch-07-3 \
            .recovery/patch-08 \
            .recovery/patch-09 \
            .recovery/patch-10 \
            | base64 --decode > "$RUNNER_TEMP/production.patch.xz"
          xz --test "$RUNNER_TEMP/production.patch.xz"
          xz --decompress --stdout "$RUNNER_TEMP/production.patch.xz" > "$RUNNER_TEMP/production.patch"
          echo "$PATCH_SHA256  $RUNNER_TEMP/production.patch" | sha256sum --check

          cat bootstrap/chunk-* | base64 --decode > "$RUNNER_TEMP/original.tar.gz"
          tar -tzf "$RUNNER_TEMP/original.tar.gz" >/dev/null
          mkdir "$RUNNER_TEMP/source"
          tar -xzf "$RUNNER_TEMP/original.tar.gz" -C "$RUNNER_TEMP/source"
          git -C "$RUNNER_TEMP/source" init -q
          git -C "$RUNNER_TEMP/source" add -A
          git -C "$RUNNER_TEMP/source" -c user.name=recovery -c user.email=recovery@example.invalid commit -qm baseline
          git -C "$RUNNER_TEMP/source" apply --index --exclude=RECOVERED_ARCHIVE_FILE_LIST.txt "$RUNNER_TEMP/production.patch"
          rm -rf "$RUNNER_TEMP/source/.git"

          test -f "$RUNNER_TEMP/source/package.json"
          test -f "$RUNNER_TEMP/source/src/game/pathfinding.ts"
          test -f "$RUNNER_TEMP/source/src/scenes/GameScene.ts"
          test -f "$RUNNER_TEMP/source/.github/workflows/ci.yml"
          test -f "$RUNNER_TEMP/source/.github/workflows/pages.yml"
          test ! -e "$RUNNER_TEMP/source/bootstrap"
          test ! -e "$RUNNER_TEMP/source/.recovery"
          test ! -e "$RUNNER_TEMP/source/.github/workflows/materialize.yml"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/source/." .
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Restore reviewed Midnight Switchyard source tree'
          git push origin "HEAD:$TARGET_BRANCH"
