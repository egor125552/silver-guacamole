name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [Pages Release Gate]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  statuses: write
  pages: write
  id-token: write

env:
  PAGE_URL: https://egor125552.github.io/silver-guacamole/

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      deployed_sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Download release metadata
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: pages-release-metadata
          path: .pages-release
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sha="${{ github.sha }}"
          else
            sha="$(tr -d '\r\n' < .pages-release/pages-release-sha.txt)"
          fi
          if [ "$sha" = "SKIP" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$sha" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;;
            *) echo "Invalid release SHA: $sha" >&2; exit 1 ;;
          esac
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      deployed_sha: ${{ needs.prepare.outputs.deployed_sha }}
    env:
      DEPLOYED_SHA: ${{ needs.prepare.outputs.deployed_sha }}
    steps:
      - name: Record deployment start
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOYED_SHA,
              state: 'pending',
              context: 'pages/deployed',
              target_url: process.env.PAGE_URL,
              description: 'Building verified GitHub Pages release',
            });
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOYED_SHA }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install production build tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip curl
      - name: Configure Rust and wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked --version 0.15.0
      - run: npm run engine:materialize
      - run: npm ci
      - run: npm run check
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOYED_SHA: ${{ needs.build.outputs.deployed_sha }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy production artifact
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record verified Pages deployment
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOYED_SHA,
              state: 'success',
              context: 'pages/deployed',
              target_url: process.env.DEPLOYMENT_URL,
              description: 'GitHub Pages deployment completed',
            });

  report-failure:
    needs: [prepare, build, deploy]
    if: ${{ always() && needs.prepare.outputs.publish == 'true' && (needs.build.result != 'success' || needs.deploy.result != 'success') }}
    runs-on: ubuntu-latest
    env:
      DEPLOYED_SHA: ${{ needs.prepare.outputs.deployed_sha }}
    steps:
      - name: Record failed Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOYED_SHA,
              state: 'failure',
              context: 'pages/deployed',
              target_url: process.env.PAGE_URL,
              description: 'GitHub Pages deployment failed',
            });
