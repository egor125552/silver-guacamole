name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pages: write
  id-token: write

env:
  DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  PAGE_URL: https://egor125552.github.io/silver-guacamole/

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Record deployment start
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOYED_SHA,
              state: 'pending',
              context: 'pages/deployed',
              target_url: process.env.PAGE_URL,
              description: 'Building verified GitHub Pages release',
            });
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOYED_SHA }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install production build tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip curl
      - name: Configure Rust and wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked --version 0.15.0
      - run: npm run engine:materialize
      - run: npm ci
      - run: npm run check
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy production artifact
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record verified Pages deployment
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOYED_SHA,
              state: 'success',
              context: 'pages/deployed',
              target_url: process.env.DEPLOYMENT_URL,
              description: 'GitHub Pages deployment completed',
            });

  report-failure:
    needs: [build, deploy]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && (needs.build.result != 'success' || needs.deploy.result != 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Record failed Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOYED_SHA,
              state: 'failure',
              context: 'pages/deployed',
              target_url: process.env.PAGE_URL,
              description: 'GitHub Pages deployment failed',
            });
