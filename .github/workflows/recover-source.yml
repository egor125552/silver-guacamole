name: PR5 trusted write probe

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/midnight-switchyard-production
          fetch-depth: 0
          persist-credentials: true
      - name: Verify write access to production branch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .recovery
          printf 'source_pr=5\nevent=%s\n' '${{ github.event_name }}' > .recovery/pr5-write-probe.txt
          git add .recovery/pr5-write-probe.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Record PR5 write probe' || true
          git push origin HEAD:agent/midnight-switchyard-production
