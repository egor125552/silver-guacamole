name: Apply verified Midnight Switchyard source

on:
  pull_request_target:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

env:
  TARGET_BRANCH: agent/midnight-switchyard-production
  BASE_PATCH_SHA256: 88dd8f47791ea1ba254ba0ed2ce5846bac55cea94b4af2349963f039f19f3d42
  DELTA_PATCH_SHA256: 5120776bae8ebb4d31de69871859f74b7fa096747142f1bc1463cf88f27b8c3e

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: apply-midnight-source
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct verified ordinary source tree
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .recovery/patch-00 \
            .recovery/patch-01 \
            .recovery/patch-02 \
            .recovery/patch-03 \
            .recovery/patch-04 \
            .recovery/patch-missing-04 \
            .recovery/patch-05 \
            .recovery/patch-06 \
            .recovery/patch-07-0 \
            .recovery/patch-07-1 \
            .recovery/patch-07-2 \
            .recovery/patch-07-3 \
            .recovery/patch-08 \
            .recovery/patch-09 \
            .recovery/patch-10 \
            | base64 --decode > "$RUNNER_TEMP/base.patch.xz"
          xz --test "$RUNNER_TEMP/base.patch.xz"
          xz --decompress --stdout "$RUNNER_TEMP/base.patch.xz" > "$RUNNER_TEMP/base.patch"
          echo "$BASE_PATCH_SHA256  $RUNNER_TEMP/base.patch" | sha256sum --check

          cat bootstrap/chunk-* | base64 --decode > "$RUNNER_TEMP/base.tar.gz"
          tar -tzf "$RUNNER_TEMP/base.tar.gz" >/dev/null
          mkdir "$RUNNER_TEMP/source"
          tar -xzf "$RUNNER_TEMP/base.tar.gz" -C "$RUNNER_TEMP/source"
          git -C "$RUNNER_TEMP/source" init -q
          git -C "$RUNNER_TEMP/source" add -A
          git -C "$RUNNER_TEMP/source" -c user.name=recovery -c user.email=recovery@example.invalid commit -qm base
          git -C "$RUNNER_TEMP/source" apply --index --exclude=RECOVERED_ARCHIVE_FILE_LIST.txt "$RUNNER_TEMP/base.patch"
          rm -rf "$RUNNER_TEMP/source/.git"

          cat .final-text/chunk-* | base64 --decode > "$RUNNER_TEMP/delta.patch.xz"
          xz --test "$RUNNER_TEMP/delta.patch.xz"
          xz --decompress --stdout "$RUNNER_TEMP/delta.patch.xz" > "$RUNNER_TEMP/delta.patch"
          echo "$DELTA_PATCH_SHA256  $RUNNER_TEMP/delta.patch" | sha256sum --check
          git -C "$RUNNER_TEMP/source" init -q
          git -C "$RUNNER_TEMP/source" add -A
          git -C "$RUNNER_TEMP/source" -c user.name=recovery -c user.email=recovery@example.invalid commit -qm patched-base
          git -C "$RUNNER_TEMP/source" apply --index "$RUNNER_TEMP/delta.patch"
          rm -rf "$RUNNER_TEMP/source/.git"

          test -f "$RUNNER_TEMP/source/package.json"
          test -f "$RUNNER_TEMP/source/scripts/materialize-aaja.mjs"
          test -f "$RUNNER_TEMP/source/src/scenes/GameScene.ts"
          test -f "$RUNNER_TEMP/source/src/game/pathfinding.ts"
          test -f "$RUNNER_TEMP/source/.github/workflows/ci.yml"
          test -f "$RUNNER_TEMP/source/.github/workflows/pages.yml"
          test ! -e "$RUNNER_TEMP/source/bootstrap"
          test ! -e "$RUNNER_TEMP/source/.recovery"
          test ! -e "$RUNNER_TEMP/source/.final-text"
          test ! -e "$RUNNER_TEMP/source/RECOVERED_ARCHIVE_FILE_LIST.txt"

      - name: Replace production branch
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/source/." .
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Restore complete ordinary Midnight Switchyard source'
          git push origin "HEAD:$TARGET_BRANCH"
