name: Chromium Diagnostic

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  suite:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: keyboard
            args: tests/e2e/playthrough.spec.mjs --grep complete.*keyboard
          - name: voiceover
            args: tests/e2e/playthrough.spec.mjs --grep complete.*voiceover
          - name: gestures
            args: tests/e2e/playthrough.spec.mjs --grep complete.*gestures
          - name: persistence
            args: tests/e2e/playthrough.spec.mjs --grep win.*persists
          - name: overheat
            args: tests/e2e/hazards.spec.mjs --grep overheating
    name: chromium-${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
          run-id: 29596352930
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx playwright install --with-deps chromium
      - name: Run isolated suite with concise log
        shell: bash
        env:
          PW_LOCAL_SYSTEM_BROWSER: "1"
        run: |
          set +e
          npx playwright test ${{ matrix.args }} --project=chromium --retries=0 --reporter=line --trace=off > chromium-${{ matrix.name }}.log 2>&1
          code=$?
          tail -n 240 chromium-${{ matrix.name }}.log
          exit "$code"
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ matrix.name }}-log
          path: chromium-${{ matrix.name }}.log
          retention-days: 3
