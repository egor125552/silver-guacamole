name: Chromium Diagnostic

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  suite:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: keyboard
            args: tests/e2e/playthrough.spec.mjs --grep complete.*keyboard
          - name: persistence
            args: tests/e2e/playthrough.spec.mjs --grep win.*persists
    name: chromium-${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
          run-id: 29594560993
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx playwright install --with-deps chromium
      - name: Run isolated suite with complete log
        shell: bash
        run: |
          set +e
          npx playwright test ${{ matrix.args }} --project=chromium --retries=0 > chromium-${{ matrix.name }}.log 2>&1
          code=$?
          cat chromium-${{ matrix.name }}.log
          exit "$code"
      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ matrix.name }}-diagnostics
          path: |
            chromium-${{ matrix.name }}.log
            playwright-report
            test-results
          retention-days: 3
